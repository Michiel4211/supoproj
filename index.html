<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Brief</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #1a1515;
            overflow: hidden;
            touch-action: manipulation;
        }
        .handwritten {
            font-family: 'Dancing Script', cursive;
        }
        .old-paper {
            font-family: 'Special Elite', cursive;
            background-color: #f3e5ab;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 50px rgba(139, 69, 19, 0.3);
            border: 2px solid #d2b48c;
        }

        /* Numpad Knoppen */
        .key {
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .key:active {
            transform: scale(0.9);
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Brief Animatie */
        #letter-container {
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .letter-folded {
            transform: scale(0.5) translateY(100px);
            opacity: 0;
            pointer-events: none;
        }
        .letter-revealed {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* Het "Openvouwen" van de brief */
        .paper-content {
            transition: all 1s ease-in-out;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
        }
        .paper-open .paper-content {
            max-height: 600px;
            opacity: 1;
            padding: 2rem;
        }
        .paper-open .click-hint {
            display: none;
        }

        /* Schudden bij fout */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- De Kluis Interface -->
    <div id="vault-ui" class="w-full max-w-sm z-10">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-amber-500 uppercase tracking-widest mb-1">Beveiligde Kluis</h1>
            <p class="text-gray-500 text-xs">Voer de 4-cijferige code in</p>
        </div>

        <div id="vault-box" class="bg-zinc-900 rounded-3xl p-6 shadow-2xl border-4 border-zinc-800">
            <!-- Scherm -->
            <div class="bg-black rounded-xl p-4 mb-6 border-2 border-zinc-700 shadow-inner flex justify-center gap-4">
                <div id="slot-1" class="w-8 h-10 border-b-4 border-amber-600 text-2xl text-amber-500 flex items-center justify-center font-mono">_</div>
                <div id="slot-2" class="w-8 h-10 border-b-4 border-amber-600 text-2xl text-amber-500 flex items-center justify-center font-mono">_</div>
                <div id="slot-3" class="w-8 h-10 border-b-4 border-amber-600 text-2xl text-amber-500 flex items-center justify-center font-mono">_</div>
                <div id="slot-4" class="w-8 h-10 border-b-4 border-amber-600 text-2xl text-amber-500 flex items-center justify-center font-mono">_</div>
            </div>

            <!-- Numpad -->
            <div class="grid grid-cols-3 gap-3">
                <button onclick="addNum('1')" class="key text-white py-4 bg-zinc-800 rounded-2xl text-xl font-bold">1</button>
                <button onclick="addNum('2')" class="key text-white py-4 bg-zinc-800 rounded-2xl text-xl font-bold">2</button>
                <button onclick="addNum('3')" class="key text-white py-4 bg-zinc-800 rounded-2xl text-xl font-bold">3</button>
                <button onclick="addNum('4')" class="key text-white py-4 bg-zinc-800 rounded-2xl text-xl font-bold">4</button>
                <button onclick="addNum('5')" class="key text-white py-4 bg-zinc-800 rounded-2xl text-xl font-bold">5</button>
                <button onclick="addNum('6')" class="key text-white py-4 bg-zinc-800 rounded-2xl text-xl font-bold">6</button>
                <button onclick="addNum('7')" class="key text-white py-4 bg-zinc-800 rounded-2xl text-xl font-bold">7</button>
                <button onclick="addNum('8')" class="key text-white py-4 bg-zinc-800 rounded-2xl text-xl font-bold">8</button>
                <button onclick="addNum('9')" class="key text-white py-4 bg-zinc-800 rounded-2xl text-xl font-bold">9</button>
                <button onclick="delNum()" class="key text-red-500 py-4 bg-zinc-800/50 rounded-2xl text-sm font-bold uppercase">WIS</button>
                <button onclick="addNum('0')" class="key text-white py-4 bg-zinc-800 rounded-2xl text-xl font-bold">0</button>
                <button onclick="checkCode()" class="key text-green-500 py-4 bg-zinc-800/50 rounded-2xl text-sm font-bold uppercase">OK</button>
            </div>
            
        </div>
    </div>

    <!-- De Brief (Eerst verborgen) -->
    <div id="letter-container" class="fixed inset-0 z-50 flex items-center justify-center p-4 letter-folded">
        <div id="paper" class="old-paper relative w-full max-w-sm rounded-sm cursor-pointer transform rotate-1 transition-transform hover:rotate-0" onclick="openLetter()">
            
            <!-- De Brief Dicht (Gevouwen look) -->
            <div id="paper-closed" class="flex flex-col items-center justify-center p-12">
                <div class="text-6xl mb-4">📜</div>
                <p class="handwritten text-2xl text-amber-900">Voor Guya...</p>
                <p class="click-hint mt-8 text-xs text-amber-800/60 animate-bounce uppercase font-bold tracking-widest">Klik om te openen</p>
            </div>

            <div class="paper-content text-center">
                <div class="mb-6">
                    <span class="text-4xl">👑</span>
                </div>
                <div class="py-8" id="secret-msg">
                    </div>
            </div>

            <!-- Decoratieve scheurlijnen -->
            <div class="absolute top-0 left-0 w-full h-2 bg-black/5"></div>
            <div class="absolute bottom-0 left-0 w-full h-2 bg-black/5"></div>
        </div>
    </div>
