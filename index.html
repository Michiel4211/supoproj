<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onze</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        
        .grid-container {
            display: grid;
            background-color: #334155;
            border: 3px solid #0f172a;
            gap: 1px;
            padding: 1px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .cell {
            width: 36px;
            height: 36px;
            background-color: #1e293b;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .cell.white { background-color: #ffffff; }
        .cell.active { background-color: #fde047 !important; outline: 2px solid #db2777; z-index: 10; }
        .cell.highlight-word { background-color: #fef08a; }

        .cell-number {
            position: absolute;
            top: 1px;
            left: 2px;
            font-size: 8px;
            font-weight: 800;
            color: #64748b;
            line-height: 1;
            pointer-events: none;
        }

        .cell input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            outline: none;
            cursor: pointer;
            color: #0f172a;
        }

        .correct { background-color: #dcfce7 !important; color: #15803d; }
        .wrong { color: #be123c; background-color: #fee2e2 !important; }

        @media (max-width: 640px) {
            .cell { width: 30px; height: 30px; }
            .cell input { font-size: 14px; }
        }

        .clue-item.active-clue {
            background-color: #fdf2f8;
            border-left: 4px solid #db2777;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Login -->
    <div id="login-container" class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-10 text-center transition-all">
        <div class="mb-6 inline-flex items-center justify-center w-16 h-16 bg-pink-100 rounded-full text-3xl">🔑</div>
        <h1 class="text-2xl font-black mb-2">Login</h1>
        <p class="text-slate-500 mb-8 italic">"Voer het geheime wachtwoord in..."</p>
        <input type="password" id="password-input" placeholder="Wachtwoord" 
            class="w-full p-4 border-2 border-slate-100 rounded-2xl focus:border-pink-500 outline-none mb-4 text-center">
        <button onclick="handleLogin()" 
            class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg active:scale-95">
            Puzzel Starten
        </button>
        <p id="error-msg" class="text-red-500 mt-4 hidden">Oeps! Dat klopt niet.</p>
    </div>

    <!-- Puzzel Scherm -->
    <div id="puzzle-screen" class="hidden w-full max-w-7xl flex flex-col xl:flex-row gap-6 items-start">
        
        <div class="flex-1 bg-white p-6 sm:p-10 rounded-3xl shadow-xl flex flex-col items-center overflow-auto">
            <h2 class="text-2xl font-black text-slate-800 mb-6 tracking-tight flex items-center gap-2">
                <span class="text-pink-500">🧩</span> Onze Herinneringen
            </h2>
            <div id="grid" class="grid-container"></div>
            
            <div class="mt-8 flex gap-4">
                <button onclick="checkPuzzle()" class="px-8 py-3 bg-pink-600 text-white rounded-xl hover:bg-pink-700 font-bold shadow-lg transition-all active:scale-95">Checken</button>
                <button onclick="resetPuzzle()" class="px-8 py-3 bg-slate-100 text-slate-500 rounded-xl hover:bg-slate-200 font-bold">Herstart</button>
            </div>

            <div id="win-message" class="mt-6 p-4 bg-green-100 text-green-800 rounded-xl border-2 border-green-200 hidden font-bold text-center animate-bounce">
                🏆 Je hebt de hele puzzel opgelost! ❤️
            </div>
        </div>

        <!-- Hints Lijst -->
        <div class="w-full xl:w-[380px] bg-white p-8 rounded-3xl shadow-xl space-y-6 max-h-[85vh] overflow-y-auto border border-slate-100">
            <div>
                <h3 class="text-sm font-black text-pink-600 mb-3 border-b-2 border-pink-50 pb-1 uppercase tracking-widest">Horizontaal (Across)</h3>
                <ul id="across-clues" class="space-y-1"></ul>
            </div>
            <div>
                <h3 class="text-sm font-black text-pink-600 mb-3 border-b-2 border-pink-50 pb-1 uppercase tracking-widest">Verticaal (Down)</h3>
                <ul id="down-clues" class="space-y-1"></ul>
            </div>
        </div>
    </div>

    <script>
        const HASH_TARGET = "7ff93a58cb0dd494b1fca4fff855b73fe52df1ad40341050be9df73a1c13ffd9";
        
        // De data is nu Base64 geëncodeerd om "spieken" via de broncode te voorkomen.
        const _geheimeData = [
            [4, 0, "U1VTSEk=", "v", "T25zIGxpZXZlbGluZ3NldGVu", 1],
            [14, 2, "TkFBSUVO", "v", "R3V5YSdzIGhvYmJ5", 4],
            [2, 4, "U0RXT1JY", "v", "dWl0YnVpdGluZw==", 6],
            [10, 5, "SkVST0VO", "v", "ZGUgcHN5Y2hvcGFhdA==", 8],
            [7, 6, "QlVSUklUTw==", "v", "TWljaGllbHMgbGlldmVsaW5nc2V0ZW4=", 9],
            [4, 7, "S0FTVEVFTA==", "v", "d2FhciB3ZSB3YW5kZWxkZW4=", 10],
            [9, 12, "QUFQ", "v", "TWljaGllbA==", 15],
            [3, 1, "R1VZQQ==", "h", "ZGUgbW9vaXN0ZSB2YW4gZGUgaGVsZSB3ZXJlbGQ=", 2],
            [12, 2, "TFVOQ0g=", "h", "d2FhciB3ZSBlbGthYXIgb250bW9ldHRl", 3],
            [0, 4, "UElTSEk=", "h", "Ym9sIGVuIHJvbmQ=", 5],
            [13, 4, "SEFLRU4=", "h", "V29ya2luZyBsaWtlIGEgZG9n", 7],
            [9, 7, "VFJBREVO", "h", "d2FhcmRvb3Igd2Ugc25lbCBtaW5pcyBrdW5uZW4gbmVtZW4=", 11],
            [0, 8, "RkFSTkFN", "h", "ZWVuIGJlaGFhcmRl", 12],
            [4, 10, "VEhBSUxBTkQ=", "h", "b256ZSBlZXJzdGUgdmFrYW50aWU=", 13],
            [6, 12, "Vk9NQVI=", "h", "ZGUgZXJnc3RlIHBsZWsgaW4gQWxtZXJl", 14]
        ];

        // Decodeer de array on-the-fly zodat de game normaal kan draaien
        const puzzleData = _geheimeData.map(item => ({
            x: item[0],
            y: item[1],
            w: atob(item[2]),
            d: item[3],
            c: atob(item[4]),
            n: item[5]
        }));

        let gridRows = 15;
        let gridCols = 18;
        let activeX = -1, activeY = -1;
        let direction = 'h';

        async function handleLogin() {
            const input = document.getElementById('password-input').value.toLowerCase().trim();
            const msgUint8 = new TextEncoder().encode(input);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            if (hashHex === HASH_TARGET) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('puzzle-screen').classList.remove('hidden');
                buildGrid();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        function buildGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = `repeat(${gridCols}, 1fr)`;
            
            for(let y=0; y<gridRows; y++) {
                for(let x=0; x<gridCols; x++) {
                    const cell = document.createElement('div');
                    cell.id = `c-${x}-${y}`;
                    cell.className = 'cell';
                    cell.onclick = () => onCellClick(x, y);
                    
                    const input = document.createElement('input');
                    input.maxLength = 1;
                    input.onkeydown = (e) => handleKey(e, x, y);
                    cell.appendChild(input);
                    
                    gridEl.appendChild(cell);
                }
            }

            puzzleData.forEach(item => {
                for(let i=0; i<item.w.length; i++) {
                    let cx = item.d === 'h' ? item.x + i : item.x;
                    let cy = item.d === 'v' ? item.y + i : item.y;
                    const cell = document.getElementById(`c-${cx}-${cy}`);
                    if (cell) {
                        cell.classList.add('white');
                        cell.dataset.answer = item.w[i].toUpperCase();
                        
                        if (i === 0) {
                            if (!cell.querySelector('.cell-number')) {
                                const num = document.createElement('span');
                                num.className = 'cell-number';
                                num.innerText = item.n;
                                cell.appendChild(num);
                            }
                        }
                    }
                }

                const li = document.createElement('li');
                li.className = "clue-item p-2 text-xs font-semibold border-l-4 border-transparent rounded cursor-pointer hover:bg-slate-50 transition-all";
                li.innerHTML = `<span class="inline-block w-5 text-pink-500">${item.n}.</span> ${item.c}`;
                li.id = `clue-${item.n}-${item.d}`;
                li.onclick = () => {
                    direction = item.d;
                    onCellClick(item.x, item.y);
                };
                document.getElementById(item.d === 'h' ? 'across-clues' : 'down-clues').appendChild(li);
            });
        }

        function onCellClick(x, y) {
            const cell = document.getElementById(`c-${x}-${y}`);
            if (!cell || !cell.classList.contains('white')) return;

            if (activeX === x && activeY === y) {
                direction = direction === 'h' ? 'v' : 'h';
            }
            
            activeX = x; activeY = y;
            updateHighlights();
            cell.querySelector('input').focus();
        }

        function updateHighlights() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active', 'highlight-word'));
            document.querySelectorAll('.clue-item').forEach(c => c.classList.remove('active-clue'));

            const cell = document.getElementById(`c-${activeX}-${activeY}`);
            if (cell) cell.classList.add('active');

            let cx = activeX, cy = activeY;
            // Backwards search to start of word
            while(true) {
                let tx = direction === 'h' ? cx - 1 : cx;
                let ty = direction === 'v' ? cy - 1 : cy;
                const prev = document.getElementById(`c-${tx}-${ty}`);
                if (!prev || !prev.classList.contains('white')) break;
                prev.classList.add('highlight-word');
                cx = tx; cy = ty;
            }
            // Forwards search to end of word
            cx = activeX; cy = activeY;
            while(true) {
                let tx = direction === 'h' ? cx + 1 : cx;
                let ty = direction === 'v' ? cy + 1 : cy;
                const next = document.getElementById(`c-${tx}-${ty}`);
                if (!next || !next.classList.contains('white')) break;
                next.classList.add('highlight-word');
                cx = tx; cy = ty;
            }

            // Clue highlighting
            const word = puzzleData.find(w => 
                w.d === direction && 
                activeX >= w.x && activeY >= w.y && 
                (direction === 'h' ? activeX < w.x + w.w.length && activeY === w.y : activeY < w.y + w.w.length && activeX === w.x)
            );
            if (word) {
                const clueEl = document.getElementById(`clue-${word.n}-${word.d}`);
                if (clueEl) {
                    clueEl.classList.add('active-clue');
                    clueEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }
        }

        function handleKey(e, x, y) {
            if (e.key === "Backspace") {
                e.preventDefault(); e.target.value = "";
                moveFocus(-1);
            } else if (e.key === " ") {
                e.preventDefault(); direction = direction === 'h' ? 'v' : 'h';
                updateHighlights();
            } else if (e.key.length === 1 && /[a-zA-Z0-9]/.test(e.key)) {
                e.preventDefault(); e.target.value = e.key.toUpperCase();
                moveFocus(1);
            } else if (e.key.startsWith("Arrow")) {
                e.preventDefault();
                let nx = x, ny = y;
                if (e.key === "ArrowRight") nx++;
                if (e.key === "ArrowLeft") nx--;
                if (e.key === "ArrowDown") ny++;
                if (e.key === "ArrowUp") ny--;
                if (document.getElementById(`c-${nx}-${ny}`)?.classList.contains('white')) {
                    if (e.key === "ArrowRight" || e.key === "ArrowLeft") direction = 'h';
                    else direction = 'v';
                    onCellClick(nx, ny);
                }
            }
        }

        function moveFocus(step) {
            let nx = activeX + (direction === 'h' ? step : 0);
            let ny = activeY + (direction === 'v' ? step : 0);
            const next = document.getElementById(`c-${nx}-${ny}`);
            if (next && next.classList.contains('white')) onCellClick(nx, ny);
        }

        function checkPuzzle() {
            let win = true;
            document.querySelectorAll('.cell.white').forEach(cell => {
                const input = cell.querySelector('input');
                const val = input.value.toUpperCase();
                cell.classList.remove('correct', 'wrong');
                if (val === cell.dataset.answer) cell.classList.add('correct');
                else if (val !== "") { cell.classList.add('wrong'); win = false; }
                else win = false;
            });
            if (win) document.getElementById('win-message').classList.remove('hidden');
        }

        function resetPuzzle() {
            document.querySelectorAll('.cell input').forEach(i => i.value = "");
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('correct', 'wrong', 'active', 'highlight-word'));
            document.getElementById('win-message').classList.add('hidden');
        }

        document.getElementById('password-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
